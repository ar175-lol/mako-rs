name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  mako-rs-options:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          
      - uses: cachix/cache-action@v12
        with:
          name: rust-cache
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'

      - name: Verify all mako-rs options substitute correctly
        run: nix build .#checks.x86_64-linux.mako-rs-options -L

      - name: Build default package
        run: nix build .#mako-rs-custom -L
